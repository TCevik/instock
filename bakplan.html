<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bakplan</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/bakplan.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="scripts/bakplan.js" type="module"></script>
</head>
<body>
    <main class="dashboard-container">
        <div class="page-header page-header-col">
            <div class="page-header-row">
                <i class="material-icons page-header-icon">bakery_dining</i>
                <h1 class="page-header-title">Bakplan</h1>
            </div>
            <p class="page-header-subtitle">Beheer en bekijk het bakplan</p>
        </div>
        <div class="form-group upload-group">
            <label for="bakplan-input">PDF Bestand uploaden</label>
            <div class="input-wrapper">
                <input type="file" id="bakplan-input" accept=".pdf" autocomplete="off">
                <i class="material-icons">picture_as_pdf</i>
            </div>
        </div>
        <div class="day-navigation"></div>
        <div class="table-container">
            <table class="users-table">
                <thead>
                    <tr>
                         <th class="col-desc">Productomschrijving</th>
                        <th class="col-price">Prijs</th>
                        <th class="col-promo">Promo</th>
                        <th class="col-sales">Gem Verk</th>
                        <th class="col-plates">Platen</th>
                        <th class="col-derving">Derving</th>
                    </tr>
                </thead>
                <tbody id="bakplan-table-body">
                    <tr>
                        <td colspan="6" class="loading-cell">Geen gegevens beschikbaar. Upload een PDF bestand.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
