<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gebruikersbeheer</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/gebruikersbeheer.css">
    <script src="scripts/gebruikersbeheer.js" type="module"></script>
</head>
<body>
    <main class="dashboard-container">
        <div class="page-header page-header-col large-gap">
            <div class="header-wrapper">
                <div class="page-header-col">
                    <div class="page-header-row">
                        <i class="material-icons page-header-icon">people</i>
                        <h1 class="page-header-title">Gebruikersbeheer</h1>
                    </div>
                    <p class="page-header-subtitle">Beheer systeemgebruikers en hun rechten</p>
                </div>
                <div class="header-actions">
                    <button class="action-btn-secondary" id="toggleViewBtn">
                        <i class="material-icons">sort_by_alpha</i>
                        <span>Alfabetische weergave</span>
                    </button>
                    <button class="action-btn-secondary" id="openDeptModalBtn">
                        <i class="material-icons">domain</i>
                        <span>Afdelingen beheren</span>
                    </button>
                    <button class="add-user-btn" id="openModalBtn">
                        <i class="material-icons">person_add</i>
                        <span>Nieuwe gebruiker</span>
                    </button>
                </div>
            </div>
        </div>
        <div class="modal-overlay" id="userModal">
            <div class="management-card">
                <div class="modal-header">
                    <h2>Nieuwe Gebruiker Aanmaken</h2>
                    <button class="close-modal-btn" id="closeModalBtn">
                        <i class="material-icons">close</i>
                    </button>
                </div>
                <div class="message" id="message-box">
                    <i class="material-icons" id="message-icon"></i>
                    <span id="message-text"></span>
                </div>
                <form id="create-user-form" autocomplete="off" novalidate>
                    <div class="form-group">
                        <label for="full-name">Volledige naam</label>
                        <div class="input-wrapper">
                            <input type="text" id="full-name" required placeholder="bijv. Jan Jansen" autocomplete="off">
                            <i class="material-icons">person</i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="personeelsnummer">Personeelsnummer</label>
                        <div class="input-wrapper">
                            <input type="text" id="personeelsnummer" required placeholder="bijv. 12345" autocomplete="off">
                            <i class="material-icons">badge</i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="role">Rol</label>
                        <div class="input-wrapper">
                            <select id="role" required>
                                <option value="" disabled selected>Selecteer een rol</option>
                                <option value="medewerker">Medewerker</option>
                                <option value="beheerder">Beheerder</option>
                            </select>
                            <i class="material-icons">manage_accounts</i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Afdelingen</label>
                        <div class="checkbox-group" id="user-afdelingen-container"></div>
                    </div>
                    <div class="form-group">
                        <label for="password">Wachtwoord</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" required placeholder="••••••••" autocomplete="off">
                            <i class="material-icons">lock</i>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span>Gebruiker Aanmaken</span>
                        <i class="material-icons">person_add</i>
                    </button>
                </form>
            </div>
        </div>
        <div class="modal-overlay" id="deptModal">
            <div class="management-card">
                <div class="modal-header">
                    <h2>Afdelingen Beheren</h2>
                    <button class="close-modal-btn" id="closeDeptModalBtn">
                        <i class="material-icons">close</i>
                    </button>
                </div>
                <div class="message" id="dept-message-box">
                    <i class="material-icons" id="dept-message-icon"></i>
                    <span id="dept-message-text"></span>
                </div>
                <form id="add-dept-form" autocomplete="off">
                    <div class="form-group">
                        <label for="new-dept-name">Nieuwe afdeling toevoegen</label>
                        <div class="input-wrapper-btn">
                            <div class="input-wrapper flex-grow">
                                <input type="text" id="new-dept-name" required placeholder="bijv. Magazijn" autocomplete="off">
                                <i class="material-icons">storefront</i>
                            </div>
                            <button type="submit" class="submit-btn compact" id="addDeptBtn">
                                <i class="material-icons">add</i>
                            </button>
                        </div>
                    </div>
                </form>
                <div class="dept-list-container">
                    <label>Bestaande afdelingen</label>
                    <ul class="dept-list" id="dept-list"></ul>
                </div>
            </div>
        </div>
        <div class="modal-overlay" id="confirmModal">
            <div class="management-card">
                <div class="modal-header">
                    <h2>Gebruiker Verwijderen</h2>
                    <button class="close-modal-btn" id="closeConfirmModalBtn">
                        <i class="material-icons">close</i>
                    </button>
                </div>
                <p class="confirm-text">
                    Weet je zeker dat je gebruiker <strong id="confirm-user-name"></strong> wilt verwijderen? Dit kan niet ongedaan worden gemaakt.
                </p>
                <div class="confirm-btn-container">
                    <button class="action-btn" id="cancelDeleteBtn">Annuleren</button>
                    <button class="delete-btn" id="confirmDeleteBtn">Verwijderen</button>
                </div>
            </div>
        </div>
        <div id="department-sections-container"></div>
    </main>
</body>
</html>
