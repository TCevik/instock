<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vulplanning Maker</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/vulplanning.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="scripts/vulplanning.js" type="module"></script>
</head>
<body>
    <main class="dashboard-container">
        <div class="page-header page-header-col">
            <div class="page-header-row" style="justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <i class="material-icons page-header-icon">assignment</i>
                    <h1 class="page-header-title">Vulplanning Maker</h1>
                </div>
                <button id="reset-planning-btn" class="action-btn delete" style="display: none; padding: 8px 16px; background-color: var(--danger-color); color: #fff; border-radius: 8px; font-weight: 500;">Opnieuw Beginnen</button>
            </div>
            <p class="page-header-subtitle">Beheer en bekijk de vulplanning</p>
        </div>

        <div id="step-1-container">
            <div class="form-group upload-group">
                <label for="vulplanning-input">Dagrooster PDF uploaden</label>
                <div class="input-wrapper">
                    <input type="file" id="vulplanning-input" accept=".pdf" autocomplete="off">
                    <i class="material-icons">picture_as_pdf</i>
                </div>
            </div>
            <div class="people-card" id="people-card" style="display: none;">
                <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">Medewerkers selecteren</h2>
                <div class="people-grid" id="people-list"></div>
                <button id="next-step-btn" class="submit-btn" style="margin-top: 20px; max-width: 200px;" disabled>Volgende</button>
            </div>
        </div>

        <div id="step-2-container" style="display: none;">
            <div class="form-group upload-group">
                <label for="colli-input">Colli Overzicht PDF uploaden</label>
                <div class="input-wrapper">
                    <input type="file" id="colli-input" accept=".pdf" autocomplete="off">
                    <i class="material-icons">picture_as_pdf</i>
                </div>
            </div>
            <div class="drag-drop-workspace" id="drag-drop-workspace" style="display: none; margin-top: 20px;">
                <div class="workspace-left-column">
                    <div class="sort-filter-bar">
                        <label for="filler-sort-select">Sorteer vullers:</label>
                        <select id="filler-sort-select" autocomplete="off">
                            <option value="name-asc">Naam (A - Z)</option>
                            <option value="name-desc">Naam (Z - A)</option>
                            <option value="start-asc">Begintijd (Vroeg - Laat)</option>
                            <option value="start-desc">Begintijd (Laat - Vroeg)</option>
                            <option value="end-asc">Eindtijd (Vroeg - Laat)</option>
                            <option value="end-desc">Eindtijd (Laat - Vroeg)</option>
                        </select>
                    </div>
                    <div class="fillers-container" id="fillers-container"></div>
                </div>
                <div class="tasks-container" id="tasks-container">
                    <div id="tasks-drop-overlay" class="tasks-drop-overlay">
                        <i class="material-icons" style="font-size: 32px; margin-bottom: 8px; color: var(--danger-color);">delete_outline</i>
                        <span style="font-size: 14px; font-weight: 500; text-align: center; color: var(--text-color);">Terug naar<br>onverdeelde taken</span>
                    </div>
                    <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">Onverdeelde Taken</h2>
                    <div class="tasks-tabs">
                        <button class="tab-btn active" id="tab-fill" autocomplete="off">Vullen</button>
                        <button class="tab-btn" id="tab-mirror" autocomplete="off">Spiegelen</button>
                        <button class="tab-btn" id="tab-other" autocomplete="off">Overige</button>
                    </div>
                    <div class="tasks-grid" id="unassigned-fill-tasks"></div>
                    <div class="tasks-grid" id="unassigned-mirror-tasks" style="display: none;"></div>
                    <div class="tasks-grid" id="unassigned-other-tasks" style="display: none;"></div>
                    <button id="add-custom-task-btn" class="submit-btn" style="margin-top: 12px; font-size: 13px; padding: 8px 12px; height: auto; display: none;">+ Custom taak toevoegen</button>
                </div>
            </div>
        </div>
    </main>

    <div id="helper-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 16px;">Iemand laten helpen</h3>
            
            <div class="form-group" style="margin-bottom: 16px;">
                <label for="helper-select">Kies helper</label>
                <div class="input-wrapper">
                    <select id="helper-select" style="width: 100%; padding: 10px; background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-color);"></select>
                </div>
            </div>

            <div class="form-group" id="helper-duration-group" style="margin-bottom: 16px;">
                <label for="helper-duration">Tijd (in minuten)</label>
                <div class="input-wrapper">
                    <input type="number" id="helper-duration" min="1" placeholder="Minuten..." style="width: 100%; padding: 10px; background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-color);">
                </div>
            </div>

            <label class="person-checkbox-label" style="margin-bottom: 8px; padding: 6px 10px;">
                <input type="checkbox" id="helper-max-checkbox">
                <span class="person-name">Maximaal</span>
            </label>
            <label class="person-checkbox-label" style="margin-bottom: 20px; padding: 6px 10px;">
                <input type="checkbox" id="helper-half-checkbox">
                <span class="person-name">50/50</span>
            </label>

            <div id="helper-error-msg" style="color: var(--danger-color); font-size: 13px; font-weight: 500; margin-bottom: 12px; display: none;">kies eerst een vuller om de tijd te zien</div>

            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button id="modal-cancel-btn" class="submit-btn" style="background: var(--border-color); color: var(--text-color); max-width: 100px; box-shadow: none;">Annuleren</button>
                <button id="modal-save-btn" class="submit-btn" style="max-width: 100px;">Opslaan</button>
            </div>
        </div>
    </div>

    <div id="duration-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 16px;">Tijd aanpassen</h3>
            <div class="form-group" style="margin-bottom: 16px;">
                <label for="task-duration-input">Tijd (in minuten)</label>
                <div class="input-wrapper">
                    <input type="number" id="task-duration-input" min="1" placeholder="Minuten..." style="width: 100%; padding: 10px; background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-color);">
                </div>
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button id="duration-cancel-btn" class="submit-btn" style="background: var(--border-color); color: var(--text-color); max-width: 100px; box-shadow: none;">Annuleren</button>
                <button id="duration-save-btn" class="submit-btn" style="max-width: 100px;">Opslaan</button>
            </div>
        </div>
    </div>

    <div id="custom-task-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 16px;">Custom taak toevoegen</h3>
            <div class="form-group" style="margin-bottom: 16px;">
                <label for="custom-task-name-input">Naam taak</label>
                <div class="input-wrapper">
                    <input type="text" id="custom-task-name-input" placeholder="Bijv. Schoonmaken..." style="width: 100%; padding: 10px; background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-color);">
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 16px;">
                <label for="custom-task-duration-input">Tijd (in minuten)</label>
                <div class="input-wrapper">
                    <input type="number" id="custom-task-duration-input" min="1" placeholder="Minuten..." style="width: 100%; padding: 10px; background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-color);">
                </div>
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button id="custom-task-cancel-btn" class="submit-btn" style="background: var(--border-color); color: var(--text-color); max-width: 100px; box-shadow: none;">Annuleren</button>
                <button id="custom-task-save-btn" class="submit-btn" style="max-width: 100px;">Toevoegen</button>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 420px;">
            <h3 id="confirm-modal-title" style="font-size: 18px; font-weight: 600; margin-bottom: 12px; color: var(--text-color);">Bevestigen</h3>
            <p id="confirm-modal-message" style="font-size: 14px; color: var(--text-color-muted); margin-bottom: 20px; line-height: 1.5;"></p>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button id="confirm-cancel-btn" class="action-btn" style="padding: 8px 16px; background-color: var(--input-bg);">Annuleren</button>
                <button id="confirm-ok-btn" class="action-btn delete" style="padding: 8px 16px; background-color: var(--danger-color); color: #fff;">Overschrijven</button>
            </div>
        </div>
    </div>
</body>
</html>
