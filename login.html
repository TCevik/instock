<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Inloggen - InStock</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="scripts/main.js"></script>
    <script src="scripts/login.js"></script>
</head>
<body>

    <div class="login-container">
        <div id="login-view" class="login-card">
            <h2>Inloggen</h2>
            <div id="login-msg" class="message-box"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-winkel">Winkel</label>
                    <select id="login-winkel" required>
                        <option value="" disabled selected>Selecteer een winkel</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="login-personeelsnummer">Personeelsnummer</label>
                    <input type="number" id="login-personeelsnummer" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Wachtwoord</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn-primary">Inloggen</button>
            </form>
            <div class="card-footer">
                <a href="#" id="show-forgot">Wachtwoord vergeten?</a>
            </div>
        </div>
    </div>

    <div id="forgot-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Wachtwoord vergeten</h3>
            <p>Neem contact op met je manager of beheerder om je wachtwoord te laten resetten.</p>
            <button id="close-modal-btn" class="btn-primary">Sluiten</button>
        </div>
    </div>

</body>
</html>
