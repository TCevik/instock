<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inloggen - InStock</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="scripts/login.js" type="module"></script>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="material-icons">inventory_2</i>
                    <span>INSTOCK</span>
                </div>
                <p>Log in om toegang te krijgen tot uw winkel</p>
            </div>

            <div class="error-message" id="error-message">
                <i class="material-icons">error_outline</i>
                <span id="error-text"></span>
            </div>

            <form id="login-form" autocomplete="off" novalidate>
                <div class="form-group">
                    <label for="store-code">Winkelcode</label>
                    <div class="input-wrapper">
                        <input type="text" id="store-code" placeholder="bijv. AMS01" autocomplete="off" required>
                        <i class="material-icons">store</i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="employee-id">Personeelsnummer</label>
                    <div class="input-wrapper">
                        <input type="text" id="employee-id" placeholder="bijv. 12345" autocomplete="off" required>
                        <i class="material-icons">badge</i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Wachtwoord</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" autocomplete="off" required>
                        <i class="material-icons">lock</i>
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <label class="remember-me-label">
                        <input type="checkbox" id="remember-me">
                        <span>Onthoud winkelcode en personeelsnummer</span>
                    </label>
                </div>

                <button type="submit" class="login-btn">
                    <span>Inloggen</span>
                    <i class="material-icons">login</i>
                </button>
            </form>
        </div>
    </div>
</body>

</html>
