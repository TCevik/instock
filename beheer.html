<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Beheer - inStock</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/beheer.css">
    <script src="scripts/main.js"></script>
    <script src="scripts/header.js"></script>
    <script src="scripts/beheer.js"></script>
</head>
<body>
    <div class="beheer-container">
        <div class="beheer-column">
            <h1 class="page-title">Medewerker Aanmaken</h1>
            <div id="beheer-msg" class="message-box"></div>
            <form id="create-user-form" class="admin-form">
                <div class="form-group">
                    <label for="medewerker-naam">Volledige Naam</label>
                    <input type="text" id="medewerker-naam" required>
                </div>
                <div class="form-group">
                    <label for="medewerker-nummer">Personeelsnummer</label>
                    <input type="number" id="medewerker-nummer" required>
                </div>
                <div class="form-group">
                    <label for="medewerker-password">Wachtwoord</label>
                    <input type="password" id="medewerker-password" required>
                </div>
                <button type="submit" class="btn-primary">Medewerker aanmaken</button>
            </form>
        </div>

        <div class="beheer-column">
            <h2 class="page-title">Medewerkers Overzicht</h2>
            <div id="users-list" class="users-grid"></div>
        </div>
    </div>

    <div id="edit-user-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Medewerker Bewerken</h3>
            <div id="edit-msg" class="message-box"></div>
            <form id="edit-user-form">
                <input type="hidden" id="edit-user-id">
                <div class="form-group">
                    <label for="edit-medewerker-naam">Volledige Naam</label>
                    <input type="text" id="edit-medewerker-naam" required>
                </div>
                <div class="form-group">
                    <label for="edit-medewerker-nummer">Personeelsnummer</label>
                    <input type="number" id="edit-medewerker-nummer" required>
                </div>
                <div class="form-group">
                    <label for="edit-medewerker-password">Nieuw Wachtwoord (optioneel)</label>
                    <input type="password" id="edit-medewerker-password">
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-primary">Opslaan</button>
                    <button type="button" id="close-edit-modal-btn" class="btn-secondary">Annuleren</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
