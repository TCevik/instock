<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/index.css">
    <script src="scripts/supabase.js" defer></script>
    <script src="scripts/header.js" defer></script>
    <script src="scripts/index.js" defer></script>
</head>

<body>
    <main class="dashboard-container">
        <div class="page-header" style="flex-direction: column; align-items: flex-start; gap: 6px; margin-bottom: 28px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <i class="material-icons" style="color: var(--accent-color-sidemenu); font-size: 30px;">dashboard</i>
                <h1 id="welcome-message" style="font-size: 26px; font-weight: 700; color: var(--text-color); margin: 0;">Welkom terug!</h1>
            </div>
            <p style="font-size: 13px; color: var(--text-color-muted); font-weight: 400; margin: 0;">Bekijk de huidige status en beheer de voorraad</p>
        </div>
        <div class="dashboard-grid" id="dashboardGrid"></div>
    </main>
</body>

</html>
