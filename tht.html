<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>THT Controle</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/product-checker.css">
    <link rel="stylesheet" href="css/tht.css">
    <script src="scripts/main.js"></script>
    <script src="scripts/header.js"></script>
    <script src="scripts/tht.js"></script>
</head>
<body>
    <div class="product-checker-container">
        <h1 id="tht-title" class="page-title">THT Producten</h1>
        <div id="tht-datepicker-container" class="tht-filter-container">
            <label for="tht-target-date" class="tht-filter-label">Toon producten tot en met:</label>
            <input type="date" id="tht-target-date" class="checker-input tht-filter-input">
        </div>
        <div id="tht-afdeling-container" class="tht-filter-container">
            <label for="tht-afdeling-select" class="tht-filter-label">Filter op afdeling:</label>
            <select id="tht-afdeling-select" class="checker-input tht-filter-select">
                <option value="">Alle afdelingen</option>
            </select>
        </div>
        <div id="controle-action-container" class="tht-action-container"></div>
        <div id="product-results" class="results-container"></div>
    </div>
</body>
</html>
