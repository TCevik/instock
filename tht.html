<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>THT Controle</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/product-checker.css">
    <link rel="stylesheet" href="css/tht.css">
    <script src="scripts/main.js"></script>
    <script src="scripts/header.js"></script>
    <script src="scripts/tht.js"></script>
</head>
<body>
    <div class="product-checker-container">
        <div class="page-title-wrapper" style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 16px;">
            <h1 id="tht-title" class="page-title" style="margin-bottom: 0;">THT Producten</h1>
            <button id="tht-registration-btn" class="checker-btn" style="width: auto; padding: 10px 20px; font-size: 0.95rem; border-radius: 12px;">THT Registratie</button>
        </div>
        <div id="search-section" class="search-section" style="display: none; flex-direction: column; width: 100%; gap: 12px; margin-bottom: 16px;">
            <div style="display: flex; gap: 8px; width: 100%;">
                <button id="cancel-registration-btn" class="checker-btn" style="width: auto; padding: 10px 20px; background: #2d2d2d; font-size: 0.95rem; border-radius: 12px; display: flex; align-items: center; gap: 6px;">
                    <span class="material-icons" style="font-size: 1.2rem;">arrow_back</span>
                    <span>Annuleren</span>
                </button>
            </div>
            <div style="display: flex; gap: 8px; width: 100%;">
                <input type="text" id="product-input" class="checker-input" placeholder="Productnaam of barcode..." autocomplete="off">
                <button id="check-btn" class="checker-btn" style="width: auto; padding: 0 24px; border-radius: 12px;">Zoeken</button>
            </div>
        </div>
        <div id="tht-datepicker-container" class="tht-filter-container">
            <label for="tht-target-date" class="tht-filter-label">Toon producten tot en met:</label>
            <input type="date" id="tht-target-date" class="checker-input tht-filter-input" autocomplete="off">
        </div>
        <div id="tht-afdeling-container" class="tht-filter-container">
            <label for="tht-afdeling-select" class="tht-filter-label">Filter op afdeling:</label>
            <select id="tht-afdeling-select" class="checker-input tht-filter-select">
                <option value="">Alle afdelingen</option>
            </select>
        </div>
        <div id="controle-action-container" class="tht-action-container"></div>
        <div id="product-results" class="results-container"></div>
    </div>
</body>
</html>
