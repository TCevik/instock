<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>THT Controle</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/product-checker.css">
    <script src="scripts/main.js"></script>
    <script src="scripts/header.js"></script>
    <script src="scripts/tht.js"></script>
</head>
<body>
    <div class="product-checker-container">
        <h1 id="tht-title" style="font-size: 1.8rem; font-weight: 800; text-align: center; margin-bottom: 8px;">THT Producten</h1>
        <div id="tht-datepicker-container" style="width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px;">
            <label for="tht-target-date" style="color: #888888; font-weight: 500; text-align: center; font-size: 0.9rem;">Toon producten tot en met:</label>
            <input type="date" id="tht-target-date" class="checker-input" style="max-width: 250px; margin: 0 auto; padding: 12px 16px;">
        </div>
        <div id="controle-action-container" style="width: 100%; display: flex; justify-content: center; margin-bottom: 24px;"></div>
        <div id="product-results" class="results-container"></div>
    </div>
</body>
</html>
