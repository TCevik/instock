<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>THT Controle</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/product-checker.css">
    <script src="scripts/main.js"></script>
    <script src="scripts/header.js"></script>
    <script src="scripts/tht.js"></script>
</head>
<body>
    <div class="product-checker-container">
        <h1 id="tht-title" class="page-title">THT Producten</h1>
        <div id="tht-datepicker-container" style="width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px;">
            <label for="tht-target-date" style="color: #888888; font-weight: 500; text-align: left; font-size: 0.9rem;">Toon producten tot en met:</label>
            <input type="date" id="tht-target-date" class="checker-input" style="padding: 12px 16px;">
        </div>
        <div id="tht-afdeling-container" style="width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px;">
            <label for="tht-afdeling-select" style="color: #888888; font-weight: 500; text-align: left; font-size: 0.9rem;">Filter op afdeling:</label>
            <select id="tht-afdeling-select" class="checker-input" style="padding: 12px 16px; height: auto;">
                <option value="">Alle afdelingen</option>
            </select>
        </div>
        <div id="controle-action-container" style="width: 100%; display: flex; justify-content: center; margin-bottom: 24px;"></div>
        <div id="product-results" class="results-container"></div>
    </div>
</body>
</html>
